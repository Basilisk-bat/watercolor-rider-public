<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/watercolor-rider-public/favicon.svg" />
    <title>Watercolor Rider</title>
    <script type="module" crossorigin src="/watercolor-rider-public/assets/index-Bqe8C5Yf.js"></script>
    <link rel="stylesheet" crossorigin href="/watercolor-rider-public/assets/index-aG5jn3s7.css">
  </head>
  <body>
    <div id="app">
      <canvas id="game" aria-label="Watercolor Rider playfield" tabindex="-1"></canvas>

      <section class="main-menu" id="mainMenu" aria-label="Main menu" aria-hidden="false">
        <div class="menu-panel">
          <button class="tool menu-close" id="menuClose" type="button" aria-label="Close menu" title="Close menu">
            <i data-lucide="x"></i>
          </button>
          <div class="menu-brand">
            <span class="brand-mark"></span>
            <h1>Watercolor Rider</h1>
          </div>
          <div class="menu-actions" aria-label="Menu actions">
            <button class="menu-action" id="menuSpawn" type="button">
              <i data-lucide="crosshair"></i>
              <span>Spawn Rider</span>
            </button>
            <button class="menu-action" id="resetTool" type="button">
              <i data-lucide="rotate-ccw"></i>
              <span>Reset Rider</span>
            </button>
            <button class="menu-action" id="undoTool" type="button">
              <i data-lucide="undo-2"></i>
              <span>Undo</span>
            </button>
            <button class="menu-action danger" id="clearTool" type="button">
              <i data-lucide="trash-2"></i>
              <span>Clear</span>
            </button>
            <button
              class="menu-action"
              id="debugToggle"
              type="button"
              aria-label="Diagnostics"
              aria-expanded="false"
              aria-controls="debugDrawer"
              title="Diagnostics"
            >
              <i data-lucide="sliders-horizontal"></i>
              <span>Diagnostics</span>
            </button>
            <button class="menu-action" id="menuHelp" type="button" aria-expanded="false" aria-controls="menuHelpPanel">
              <i data-lucide="circle-help"></i>
              <span>Help</span>
            </button>
          </div>
          <div class="menu-help" id="menuHelpPanel" hidden>
            <p>Choose Watercolor, Pencil, or Marker to draw rails. Eraser cuts rails. Spawn, Reset, and Ride use the on-screen controls.</p>
          </div>
        </div>
      </section>

      <header class="corner-brand" aria-label="Game title">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>Watercolor Rider</span>
        </div>
      </header>

      <div class="chrome-shell" aria-label="Game controls">
        <nav class="tools" aria-label="Tools">
          <button class="tool" id="menuToggle" type="button" aria-label="Menu" aria-expanded="true" title="Menu">
            <i data-lucide="menu"></i>
          </button>
          <button
            class="tool active"
            id="watercolorTool"
            type="button"
            aria-label="Watercolor"
            aria-pressed="true"
            title="Watercolor"
          >
            <i data-lucide="paintbrush"></i>
          </button>
          <button
            class="tool"
            id="pencilTool"
            type="button"
            aria-label="Pencil"
            aria-pressed="false"
            title="Pencil"
          >
            <i data-lucide="pencil"></i>
          </button>
          <button
            class="tool"
            id="markerTool"
            type="button"
            aria-label="Marker"
            aria-pressed="false"
            title="Marker"
          >
            <i data-lucide="highlighter"></i>
          </button>
          <button
            class="tool"
            id="eraseTool"
            type="button"
            aria-label="Eraser"
            aria-pressed="false"
            title="Eraser"
          >
            <i data-lucide="eraser"></i>
          </button>
          <button class="tool primary" id="playTool" type="button" aria-label="Ride" title="Ride">
            <i data-lucide="play"></i>
          </button>
        </nav>
      </div>

      <aside class="debug-drawer" id="debugDrawer" aria-label="Diagnostics" aria-hidden="true">
        <div class="debug-title">Diagnostics</div>
        <dl class="meters" aria-label="Ride metrics">
          <div>
            <dt>speed</dt>
            <dd id="speedMeter">0.0 px/s</dd>
          </div>
          <div>
            <dt>air</dt>
            <dd id="airMeter">0.0s air</dd>
          </div>
          <div>
            <dt>ink</dt>
            <dd id="inkMeter">0m ink</dd>
          </div>
          <div>
            <dt>status</dt>
            <dd data-diagnostic="status">brush</dd>
          </div>
          <div>
            <dt>zoom</dt>
            <dd data-diagnostic="zoom">100%</dd>
          </div>
          <div>
            <dt>texture</dt>
            <dd data-diagnostic="texture">0%</dd>
          </div>
          <div>
            <dt>ink</dt>
            <dd data-diagnostic="ink">0</dd>
          </div>
          <div>
            <dt>marks</dt>
            <dd data-diagnostic="marks">0</dd>
          </div>
          <div>
            <dt>trails</dt>
            <dd data-diagnostic="trails">0</dd>
          </div>
        </dl>
      </aside>

      <div class="status-strip" id="statusStrip" role="status">brush</div>
    </div>
  </body>
</html>
